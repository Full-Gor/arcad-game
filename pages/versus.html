<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship Battle Versus - Online</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #gameCanvas {
            flex-grow: 1;
            background: linear-gradient(to bottom, #000033, #000011);
        }

        .divider {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #ff0000, #ff6600);
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        #connectionPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #04fbac;
            color: white;
            text-align: center;
            z-index: 1000;
            min-width: 400px;
        }

        #connectionPanel h2 {
            color: #04fbac;
            margin-bottom: 20px;
        }

        #connectionPanel input {
            padding: 10px;
            margin: 10px;
            border: 2px solid #04fbac;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 16px;
            width: 200px;
        }

        #connectionPanel button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #04fbac;
            color: black;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #connectionPanel button:hover {
            background: #FF7F50;
            transform: scale(1.05);
        }

        #connectionPanel button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        #myPeerID {
            background: rgba(4, 251, 172, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            word-break: break-all;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            z-index: 20;
        }

        .team-score {
            display: flex;
            align-items: center;
        }

        .lives-container {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }

        .life-icon {
            width: 20px;
            height: 20px;
            margin-right: 5px;
            background: red;
            border-radius: 50%;
        }

        .point-counter {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            z-index: 20;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid;
        }

        #team1Points {
            top: 60px;
            right: 15px;
            color: #04fbac;
            border-color: #04fbac;
        }

        #team2Points {
            bottom: 60px;
            right: 15px;
            color: #FF7F50;
            border-color: #FF7F50;
        }

        #gameOverMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        #controlInfo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            z-index: 20;
        }

        #networkStatus {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #04fbac;
            font-size: 14px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- Panneau de connexion -->
    <div id="connectionPanel">
        <h2>🚀 Starship Battle Online</h2>
        <div id="myPeerID">
            Votre ID: <span id="peerIdSpan">Connexion...</span>
            <button id="copyIdBtn" style="display: none; margin-left: 10px; padding: 5px 10px; background: #04fbac; color: black; border: none; border-radius: 3px; cursor: pointer;">📋 Copier</button>
        </div>
        
        <div>
            <h3>Créer une partie</h3>
            <button id="hostGame" disabled>Héberger une partie</button>
        </div>
        
        <div>
            <h3>Rejoindre une partie</h3>
            <input type="text" id="joinGameInput" placeholder="Entrez l'ID de votre adversaire">
            <br>
            <button id="joinGame">Rejoindre</button>
        </div>
        
        <div id="connectionStatus">En attente de connexion...</div>
    </div>

    <!-- Interface de jeu -->
    <div id="scoreBoard" style="display: none;">
        <div class="team-score team1">
            <span>Joueur 1: </span>
            <span id="team1Score">0</span>
            <div id="team1Lives" class="lives-container"></div>
        </div>
        <div class="team-score team2">
            <span>Joueur 2: </span>
            <span id="team2Score">0</span>
            <div id="team2Lives" class="lives-container"></div>
        </div>
    </div>

    <div id="team1Points" class="point-counter" style="display: none;">
        <span>ÉNERGIE: 0 / 50</span>
    </div>
    <div id="team2Points" class="point-counter" style="display: none;">
        <span>ÉNERGIE: 0 / 50</span>
    </div>

    <div id="networkStatus" style="display: none;">
        <span id="statusText">Connecté</span>
    </div>

    <div id="gameOverMessage"></div>

    <div class="divider" style="display: none;"></div>
    <div id="controlInfo" style="display: none;">
        Contrôles: Souris (mouvement + clic gauche), WASD + G (J1) / Flèches + Espace (J2)
    </div>
    <canvas id="gameCanvas" style="display: none;"></canvas>

    <script>
        console.log("🚀 Démarrage Starship Battle...");

        // Variables globales
        let peer = null;
        let connection = null;
        let isHost = false;
        let gameStarted = false;
        let myPlayerIndex = 0;
        let networkLatency = 0;

        // Configuration du jeu
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // État du jeu
        const gameState = {
            players: [
                {
                    x: 0,
                    y: 0,
                    width: 49,
                    height: 49,
                    lives: 10,
                    bullets: [],
                    powerUpType: 'normal',
                    active: true,
                    shield: false,
                    points: 0,
                    impacts: 0
                },
                {
                    x: 0,
                    y: 0,
                    width: 49,
                    height: 49,
                    lives: 10,
                    bullets: [],
                    powerUpType: 'normal',
                    active: true,
                    shield: false,
                    points: 0,
                    impacts: 0
                }
            ],
            powerUps: [],
            floatingPoints: [],
            barriers: [],
            paused: false,
            gameOver: false,
            winner: null
        };

        // Sons
        const soundEffects = {
            shoot: new Audio("/audio/shoot.mp3"),
            hit: new Audio("/audio/hit.mp3"),
            powerUp: new Audio("/audio/coin.mp3")
        };

        function playSound(sound) {
            try {
                sound.currentTime = 0;
                sound.play().catch(() => {});
            } catch (error) {
                // Son optionnel
            }
        }

        // Initialisation PeerJS
        function initPeerJS() {
            if (typeof Peer === 'undefined') {
                console.error('PeerJS non disponible');
                document.getElementById('connectionStatus').textContent = 'Erreur: PeerJS non chargé';
                return;
            }

            console.log('Initialisation PeerJS...');
            document.getElementById('connectionStatus').textContent = 'Connexion aux serveurs...';
            
            try {
                peer = new Peer();
            } catch (error) {
                console.error('Erreur création Peer:', error);
                document.getElementById('connectionStatus').textContent = 'Erreur: ' + error.message;
                return;
            }
            
            peer.on('open', function(id) {
                console.log('Peer ouvert avec ID:', id);
                document.getElementById('peerIdSpan').textContent = id;
                document.getElementById('hostGame').disabled = false;
                document.getElementById('copyIdBtn').style.display = 'inline-block';
                document.getElementById('connectionStatus').textContent = 'Prêt à jouer !';
            });

            peer.on('connection', function(conn) {
                console.log('Connexion reçue de:', conn.peer);
                setupConnection(conn);
                isHost = true;
                myPlayerIndex = 0;
            });

            peer.on('error', function(err) {
                console.error('Erreur PeerJS:', err);
                document.getElementById('connectionStatus').textContent = 'Erreur: ' + (err.message || 'Connexion échouée');
            });
        }

        // Configuration de la connexion
        function setupConnection(conn) {
            connection = conn;
            
            conn.on('open', function() {
                console.log('Connexion établie!');
                document.getElementById('connectionStatus').textContent = 'Connecté!';
                startGame();
            });

            conn.on('data', function(data) {
                handleNetworkMessage(data);
            });

            conn.on('close', function() {
                console.log('Connexion fermée');
                document.getElementById('connectionStatus').textContent = 'Connexion perdue';
            });
        }

        // Gestion des messages réseau
        function handleNetworkMessage(data) {
            switch(data.type) {
                case 'playerInput':
                    handleRemotePlayerInput(data);
                    break;
                case 'bulletFired':
                    addBulletFromNetwork(data);
                    break;
                case 'ping':
                    sendMessage({type: 'pong', timestamp: data.timestamp});
                    break;
                case 'pong':
                    networkLatency = Date.now() - data.timestamp;
                    document.getElementById('statusText').textContent = `Connecté (${networkLatency}ms)`;
                    break;
            }
        }

        function sendMessage(data) {
            if (connection && connection.open) {
                connection.send(data);
            }
        }

        // Événements des boutons
        document.getElementById('hostGame').addEventListener('click', function() {
            document.getElementById('connectionStatus').textContent = 'En attente d\'un adversaire... Partagez votre ID !';
            isHost = true;
            myPlayerIndex = 0;
        });

        document.getElementById('copyIdBtn').addEventListener('click', function() {
            const peerIdText = document.getElementById('peerIdSpan').textContent;
            navigator.clipboard.writeText(peerIdText).then(function() {
                const btn = document.getElementById('copyIdBtn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Copié !';
                btn.style.background = '#00ff00';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '#04fbac';
                }, 2000);
            }).catch(function() {
                alert('ID copié: ' + peerIdText);
            });
        });

        document.getElementById('joinGame').addEventListener('click', function() {
            const peerID = document.getElementById('joinGameInput').value.trim();
            if (peerID) {
                console.log('Connexion à:', peerID);
                const conn = peer.connect(peerID);
                setupConnection(conn);
                isHost = false;
                myPlayerIndex = 1;
                document.getElementById('connectionStatus').textContent = 'Connexion en cours...';
            }
        });

        // Démarrage du jeu
        function startGame() {
            document.getElementById('connectionPanel').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('scoreBoard').style.display = 'flex';
            document.getElementById('team1Points').style.display = 'flex';
            document.getElementById('team2Points').style.display = 'flex';
            document.getElementById('networkStatus').style.display = 'block';
            document.querySelector('.divider').style.display = 'block';
            document.getElementById('controlInfo').style.display = 'block';
            
            gameStarted = true;
            initializeGame();
            gameLoop();
        }

        function initializeGame() {
            const midPoint = canvas.height / 2;
            
            gameState.players[0].x = canvas.width * 0.5;
            gameState.players[0].y = canvas.height * 0.25;
            
            gameState.players[1].x = canvas.width * 0.5;
            gameState.players[1].y = canvas.height * 0.75;

            initializeLives();
        }

        function initializeLives() {
            const team1LivesContainer = document.getElementById('team1Lives');
            const team2LivesContainer = document.getElementById('team2Lives');
            
            team1LivesContainer.innerHTML = '';
            team2LivesContainer.innerHTML = '';
            
            for (let i = 0; i < gameState.players[0].lives; i++) {
                const lifeIcon = document.createElement('div');
                lifeIcon.classList.add('life-icon');
                team1LivesContainer.appendChild(lifeIcon);
            }
            
            for (let i = 0; i < gameState.players[1].lives; i++) {
                const lifeIcon = document.createElement('div');
                lifeIcon.classList.add('life-icon');
                team2LivesContainer.appendChild(lifeIcon);
            }
        }

        // Contrôles
        const keys = {};
        const mouse = { x: 0, y: 0, clicking: false };

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            e.preventDefault();
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouse.clicking = true;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouse.clicking = false;
        });

        // Gestion des entrées
        function handleLocalPlayerInput() {
            if (!gameStarted || gameState.paused) return;
            
            const player = gameState.players[myPlayerIndex];
            if (!player.active) return;

            let moved = false;
            let shot = false;

            // Contrôles souris
            const midPoint = canvas.height / 2;
            const isInPlayerZone = myPlayerIndex === 0 ? mouse.y < midPoint : mouse.y > midPoint;
            
            if (isInPlayerZone) {
                if (Math.abs(player.x - mouse.x) > 2 || Math.abs(player.y - mouse.y) > 2) {
                    player.x = mouse.x;
                    player.y = mouse.y;
                    moved = true;
                }
                
                if (mouse.clicking) shot = true;
            }

            // Contrôles clavier
            const controls = myPlayerIndex === 0 ? 
                { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', shoot: 'KeyG' } :
                { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', shoot: 'Space' };

            const speed = 5;
            if (keys[controls.left]) { player.x -= speed; moved = true; }
            if (keys[controls.right]) { player.x += speed; moved = true; }
            if (keys[controls.up]) { player.y -= speed; moved = true; }
            if (keys[controls.down]) { player.y += speed; moved = true; }
            if (keys[controls.shoot]) shot = true;

            // Contraintes
            const minY = myPlayerIndex === 0 ? player.height/2 : midPoint + player.height/2;
            const maxY = myPlayerIndex === 0 ? midPoint - player.height/2 : canvas.height - player.height/2;
            
            player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
            player.y = Math.max(minY, Math.min(maxY, player.y));

            // Tir
            if (shot && (!player.lastShootTime || Date.now() - player.lastShootTime > 100)) {
                shootBullet(player, myPlayerIndex);
                player.lastShootTime = Date.now();
            }

            // Synchronisation réseau
            if (moved || shot) {
                sendMessage({
                    type: 'playerInput',
                    playerIndex: myPlayerIndex,
                    x: player.x,
                    y: player.y,
                    shot: shot
                });
            }
        }

        function handleRemotePlayerInput(data) {
            const player = gameState.players[data.playerIndex];
            player.x = data.x;
            player.y = data.y;
            
            if (data.shot) {
                shootBullet(player, data.playerIndex);
            }
        }

        function shootBullet(player, playerIndex) {
            if (!player.active) return;
            
            const bulletSpeed = 10;
            const bulletColor = playerIndex === 0 ? '#04fbac' : '#FF7F50';
            
            const bullet = {
                x: player.x,
                y: player.y,
                color: bulletColor,
                vy: playerIndex === 0 ? bulletSpeed : -bulletSpeed,
                vx: 0,
                playerIndex: playerIndex
            };
            
            player.bullets.push(bullet);
            
            sendMessage({
                type: 'bulletFired',
                bullet: bullet
            });
            
            playSound(soundEffects.shoot);
        }

        function addBulletFromNetwork(data) {
            const player = gameState.players[data.bullet.playerIndex];
            player.bullets.push(data.bullet);
        }

        // Mise à jour du jeu
        function updateBullets() {
            gameState.players.forEach(player => {
                player.bullets = player.bullets.filter(bullet => {
                    bullet.y += bullet.vy;
                    bullet.x += bullet.vx || 0;
                    
                    return bullet.y > -10 && bullet.y < canvas.height + 10 && 
                           bullet.x > -10 && bullet.x < canvas.width + 10;
                });
            });
        }

        function checkCollisions() {
            for (let i = 0; i < gameState.players.length; i++) {
                const player = gameState.players[i];
                if (!player.active) continue;
                
                for (let j = 0; j < gameState.players.length; j++) {
                    if (i === j) continue;
                    
                    const opponent = gameState.players[j];
                    
                    opponent.bullets = opponent.bullets.filter(bullet => {
                        const dx = Math.abs(bullet.x - player.x);
                        const dy = Math.abs(bullet.y - player.y);
                        
                        if (dx < player.width/2 && dy < player.height/2) {
                            if (!player.shield) {
                                player.impacts++;
                                
                                if (player.impacts >= 10) {
                                    player.impacts = 0;
                                    player.active = false;
                                    endGame(j);
                                }
                                
                                playSound(soundEffects.hit);
                            }
                            
                            return false;
                        }
                        
                        return true;
                    });
                }
            }
        }

        function endGame(winnerIndex) {
            gameState.gameOver = true;
            gameState.winner = winnerIndex;
            
            const gameOverMessage = document.getElementById('gameOverMessage');
            gameOverMessage.style.display = 'block';
            
            if (winnerIndex === 0) {
                gameOverMessage.textContent = "Victoire du Joueur 1 !";
                gameOverMessage.style.color = '#04fbac';
            } else {
                gameOverMessage.textContent = "Victoire du Joueur 2 !";
                gameOverMessage.style.color = '#FF7F50';
            }
            
            const replayButton = document.createElement('button');
            replayButton.textContent = "Rejouer";
            replayButton.style.display = 'block';
            replayButton.style.margin = '20px auto 0';
            replayButton.style.padding = '10px 20px';
            replayButton.style.fontSize = '18px';
            replayButton.style.cursor = 'pointer';
            replayButton.style.background = '#04fbac';
            replayButton.style.color = 'black';
            replayButton.style.border = 'none';
            replayButton.style.borderRadius = '5px';
            replayButton.onclick = resetGame;
            gameOverMessage.appendChild(replayButton);
        }

        function resetGame() {
            gameState.gameOver = false;
            gameState.winner = null;
            
            gameState.players.forEach((player, index) => {
                player.lives = 10;
                player.impacts = 0;
                player.active = true;
                player.bullets = [];
                
                const midPoint = canvas.height / 2;
                player.x = canvas.width * 0.5;
                player.y = index === 0 ? canvas.height * 0.25 : canvas.height * 0.75;
            });
            
            document.getElementById('gameOverMessage').style.display = 'none';
            document.getElementById('gameOverMessage').innerHTML = '';
            
            initializeLives();
        }

        // Rendu
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dessiner les balles
            gameState.players.forEach(player => {
                player.bullets.forEach(bullet => {
                    ctx.save();
                    ctx.fillStyle = bullet.color;
                    ctx.shadowColor = bullet.color;
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            });
            
            // Dessiner les joueurs
            gameState.players.forEach((player, index) => {
                if (!player.active) return;
                
                ctx.save();
                
                // Impacts
                if (player.impacts > 0) {
                    ctx.fillStyle = '#FF0000';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(
                        `${player.impacts}/10`,
                        player.x,
                        player.y - player.height/2 - 10
                    );
                }
                
                // Vaisseau
                ctx.fillStyle = index === 0 ? '#04fbac' : '#FF7F50';
                ctx.fillRect(
                    player.x - player.width/2,
                    player.y - player.height/2,
                    player.width,
                    player.height
                );
                
                ctx.restore();
            });
        }

        // Boucle de jeu
        function gameLoop() {
            if (!gameStarted) return;
            
            handleLocalPlayerInput();
            updateBullets();
            checkCollisions();
            render();
            
            requestAnimationFrame(gameLoop);
        }

        // Initialisation
        window.addEventListener('load', () => {
            console.log('Page chargée, vérification de PeerJS...');
            
            if (typeof Peer !== 'undefined') {
                console.log('PeerJS détecté, initialisation...');
                initPeerJS();
            } else {
                console.log('PeerJS non détecté, attente...');
                setTimeout(() => {
                    if (typeof Peer !== 'undefined') {
                        console.log('PeerJS détecté après délai');
                        initPeerJS();
                    } else {
                        console.error('PeerJS non disponible');
                        document.getElementById('connectionStatus').textContent = 'Erreur: PeerJS non chargé';
                    }
                }, 3000);
            }
        });

        console.log("✅ Code JavaScript chargé avec succès");
    </script>
</body>
</html>
